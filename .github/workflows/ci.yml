name: CI

on:
  push:
    branches: [master, main, '3.*']
  pull_request:
    branches: [master, main, '3.*']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Composer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - run: composer validate --strict --no-check-lock

  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, dom, curl, zip, sqlite3, pdo_sqlite, fileinfo, tokenizer, ctype, sodium
          coverage: none

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Verify PHP extensions
        run: |
          php -r "
          foreach (['pdo_sqlite', 'fileinfo', 'mbstring', 'tokenizer'] as \$ext) {
              if (!extension_loaded(\$ext)) {
                  fwrite(STDERR, \"Missing required PHP extension: {\$ext}\n\");
                  exit(1);
              }
          }
          "

      - name: Verify CI fixtures
        run: |
          test -f tests/Fixtures/system-apps/com_pinoox_welcome/app.php
          test -f tests/Fixtures/system-apps/com_pinoox_installer/app.php
          test -f tests/Fixtures/system-apps/com_pinoox_manager/app.php
          php -r "require 'tests/bootstrap.php';"

      - name: Verify isolated suite boundary
        run: |
          if php vendor/bin/pest --configuration=phpunit.ci.xml --list-tests | grep -q VersionCommandTest; then
            echo 'Monorepo-only tests must not appear in phpunit.ci.xml'
            exit 1
          fi

      - name: Configure git for test helpers
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Pest (isolated suite)
        run: |
          mkdir -p build
          php vendor/bin/pest --configuration=phpunit.ci.xml --log-junit=build/junit.xml 2>&1 | tee build/pest.log
        env:
          APP_ENV: test
          DB_CONNECTION: sqlite

      - name: Print test failures
        if: failure()
        run: |
          grep -E 'FAIL |⨯|failed|Exception|Error:' build/pest.log | head -50 || true
          if [ -f build/junit.xml ]; then
            grep -E '<(failure|error)' build/junit.xml | head -40 || true
          fi
