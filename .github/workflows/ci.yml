name: CI

on:
  push:
    branches: [master, main, '3.*']
  pull_request:
    branches: [master, main, '3.*']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Composer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - run: composer validate --strict --no-check-lock

  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, dom, curl, zip, sqlite3, pdo_sqlite, fileinfo, tokenizer, ctype, sodium
          coverage: none

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Verify CI fixtures
        run: |
          test -f tests/Fixtures/system-apps/com_pinoox_welcome/app.php
          test -f tests/Fixtures/system-apps/com_pinoox_installer/app.php
          test -f tests/Fixtures/system-apps/com_pinoox_manager/app.php
          php -r "require 'tests/bootstrap.php';"

      - name: Pest (isolated suite)
        run: composer test:ci
        env:
          APP_ENV: test
          DB_CONNECTION: sqlite
